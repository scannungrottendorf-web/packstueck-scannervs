<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PackScan</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

body {
font-family: -apple-system, BlinkMacSystemFont, ‘Helvetica Neue’, sans-serif;
background: #0d0f0e;
color: #e8ede9;
min-height: 100vh;
min-height: -webkit-fill-available;
}

/* HEADER */
.header {
background: #161918;
border-bottom: 1px solid #2a2e2c;
padding: 16px 20px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 100;
}
.logo {
font-size: 24px;
font-weight: 800;
color: #00e87c;
letter-spacing: -0.5px;
}
.logo span { color: #e8ede9; }
.badge {
background: #00e87c22;
border: 1px solid #00e87c;
color: #00e87c;
font-size: 13px;
font-weight: 600;
padding: 5px 14px;
border-radius: 100px;
}

/* TABS */
.tabs {
display: flex;
background: #161918;
border-bottom: 1px solid #2a2e2c;
position: sticky;
top: 57px;
z-index: 99;
}
.tab-btn {
flex: 1;
padding: 14px 8px;
text-align: center;
font-size: 15px;
font-weight: 700;
color: #5a6360;
border: none;
background: none;
border-bottom: 3px solid transparent;
cursor: pointer;
-webkit-appearance: none;
appearance: none;
}
.tab-btn.active {
color: #00e87c;
border-bottom-color: #00e87c;
}

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* ── SCAN PANEL ── */
.section {
padding: 16px;
}

.label-text {
font-size: 12px;
text-transform: uppercase;
letter-spacing: 0.8px;
color: #5a6360;
margin-bottom: 8px;
display: block;
}

/* Barcode input field */
.barcode-wrap {
display: flex;
gap: 10px;
margin-bottom: 20px;
}
.barcode-input {
flex: 1;
background: #161918;
border: 2px solid #2a2e2c;
border-radius: 12px;
color: #e8ede9;
font-size: 17px;
padding: 14px 16px;
outline: none;
-webkit-appearance: none;
appearance: none;
font-family: ‘Courier New’, monospace;
}
.barcode-input:focus {
border-color: #00e87c;
}
.scan-btn {
background: #00e87c;
border: none;
border-radius: 12px;
color: #000;
font-size: 26px;
width: 56px;
min-width: 56px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
-webkit-appearance: none;
appearance: none;
}
.scan-btn:active {
opacity: 0.7;
}

/* Current barcode display */
.code-display {
background: #161918;
border: 1px solid #2a2e2c;
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 20px;
display: none;
}
.code-display.visible { display: block; }
.code-label {
font-size: 11px;
text-transform: uppercase;
letter-spacing: 0.8px;
color: #5a6360;
margin-bottom: 4px;
}
.code-value {
font-family: ‘Courier New’, monospace;
font-size: 18px;
color: #00e87c;
font-weight: 600;
word-break: break-all;
}

/* Dimension inputs */
.dims-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 12px;
margin-bottom: 20px;
}
.dim-box {
text-align: center;
}
.dim-box label {
display: block;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 0.8px;
color: #5a6360;
margin-bottom: 6px;
}
.dim-input {
width: 100%;
background: #161918;
border: 2px solid #2a2e2c;
border-radius: 12px;
color: #e8ede9;
font-size: 24px;
font-weight: 600;
font-family: ‘Courier New’, monospace;
padding: 14px 8px;
text-align: center;
outline: none;
-webkit-appearance: none;
appearance: none;
}
.dim-input:focus {
border-color: #00e87c;
}
.dim-unit {
font-size: 11px;
color: #5a6360;
margin-top: 5px;
}

/* Volume result */
.vol-box {
background: #00e87c18;
border: 2px solid #00e87c;
border-radius: 12px;
padding: 16px 20px;
margin-bottom: 20px;
display: flex;
align-items: center;
justify-content: space-between;
}
.vol-label {
font-size: 14px;
text-transform: uppercase;
letter-spacing: 0.8px;
color: #00e87c;
font-weight: 600;
}
.vol-value {
font-family: ‘Courier New’, monospace;
font-size: 26px;
font-weight: 700;
color: #00e87c;
}

/* Save button */
.save-btn {
width: 100%;
background: #00e87c;
border: none;
border-radius: 14px;
color: #000;
font-size: 20px;
font-weight: 800;
letter-spacing: 0.5px;
padding: 18px;
cursor: pointer;
text-transform: uppercase;
-webkit-appearance: none;
appearance: none;
margin-bottom: 12px;
}
.save-btn:active { opacity: 0.75; }
.save-btn:disabled {
background: #2a2e2c;
color: #5a6360;
}

.hint {
text-align: center;
font-size: 13px;
color: #5a6360;
padding: 4px;
}

/* Empty state */
.empty-state {
text-align: center;
padding: 60px 20px;
color: #5a6360;
}
.empty-state .icon { font-size: 56px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 16px; line-height: 1.5; }

/* ── LIST PANEL ── */
.list-top {
padding: 14px 16px;
border-bottom: 1px solid #2a2e2c;
display: flex;
gap: 10px;
align-items: center;
}
.search-input {
flex: 1;
background: #161918;
border: 1px solid #2a2e2c;
border-radius: 10px;
color: #e8ede9;
font-size: 15px;
padding: 10px 14px;
outline: none;
-webkit-appearance: none;
}
.search-input:focus { border-color: #00e87c; }

.export-btn {
background: #00e87c;
border: none;
border-radius: 10px;
color: #000;
font-size: 15px;
font-weight: 800;
padding: 10px 18px;
cursor: pointer;
text-transform: uppercase;
-webkit-appearance: none;
white-space: nowrap;
}
.export-btn:active { opacity: 0.7; }

.stats-row {
display: flex;
border-bottom: 1px solid #2a2e2c;
}
.stat {
flex: 1;
padding: 12px;
text-align: center;
border-right: 1px solid #2a2e2c;
}
.stat:last-child { border-right: none; }
.stat-val {
font-family: ‘Courier New’, monospace;
font-size: 20px;
font-weight: 700;
color: #00e87c;
}
.stat-lbl {
font-size: 11px;
text-transform: uppercase;
letter-spacing: 0.5px;
color: #5a6360;
margin-top: 2px;
}

/* Package items */
.pkg-item {
display: flex;
align-items: center;
padding: 13px 16px;
border-bottom: 1px solid #2a2e2c;
gap: 12px;
background: #0d0f0e;
}
.pkg-nr {
font-size: 12px;
color: #5a6360;
font-family: ‘Courier New’, monospace;
min-width: 30px;
}
.pkg-info { flex: 1; min-width: 0; }
.pkg-code {
font-family: ‘Courier New’, monospace;
font-size: 15px;
color: #e8ede9;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.pkg-dims {
font-size: 12px;
color: #5a6360;
margin-top: 3px;
}
.pkg-vol {
text-align: right;
}
.pkg-vol-val {
font-family: ‘Courier New’, monospace;
font-size: 15px;
color: #00e87c;
font-weight: 600;
}
.pkg-vol-unit {
font-size: 11px;
color: #5a6360;
}
.del-btn {
background: none;
border: none;
color: #5a6360;
font-size: 20px;
padding: 6px 8px;
cursor: pointer;
border-radius: 8px;
-webkit-appearance: none;
line-height: 1;
}
.del-btn:active {
color: #ff6b35;
background: rgba(255,107,53,0.15);
}

/* TOAST */
#toast {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%) translateY(100px);
background: #00e87c;
color: #000;
font-size: 15px;
font-weight: 700;
padding: 13px 28px;
border-radius: 100px;
z-index: 9999;
transition: transform 0.3s ease;
white-space: nowrap;
pointer-events: none;
max-width: 90vw;
text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.warn { background: #ff6b35; }
</style>

</head>
<body>

<div class="header">
  <div class="logo">Pack<span>Scan</span></div>
  <div class="badge" id="headerBadge">0 Pakete</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('scan', this)">📷 Scannen</button>
  <button class="tab-btn" onclick="showTab('list', this)">📦 Liste</button>
</div>

<!-- SCAN PANEL -->

<div class="panel active" id="panel-scan">
  <div class="section">


<span class="label-text">Barcode scannen oder eingeben</span>
<div class="barcode-wrap">
  <input
    class="barcode-input"
    id="barcodeInput"
    type="text"
    placeholder="Barcode..."
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    inputmode="text"
  >
  <button class="scan-btn" onclick="triggerScan()" title="Kamera">📷</button>
  <div id="reader" style="width:100%; margin-top:15px; display:none;"></div>
</div>

<!-- Hidden input for native camera barcode scan on iOS -->
<input
  id="nativeScanInput"
  type="text"
  autocomplete="off"
  style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;"
>

<div class="code-display" id="codeDisplay">
  <div class="code-label">Aktueller Barcode</div>
  <div class="code-value" id="codeValue">—</div>
</div>

<div id="emptyHint" class="empty-state">
  <div class="icon">📦</div>
  <p>Barcode eingeben oder<br>📷 Kamera-Button tippen</p>
</div>

<div id="formArea" style="display:none">
  <span class="label-text">Maße eingeben (cm)</span>
  <div class="dims-grid">
    <div class="dim-box">
      <label for="dimL">Länge</label>
      <input class="dim-input" id="dimL" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1" oninput="calcVol()">
      <div class="dim-unit">cm</div>
    </div>
    <div class="dim-box">
      <label for="dimB">Breite</label>
      <input class="dim-input" id="dimB" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1" oninput="calcVol()">
      <div class="dim-unit">cm</div>
    </div>
    <div class="dim-box">
      <label for="dimH">Höhe</label>
      <input class="dim-input" id="dimH" type="number" inputmode="decimal" placeholder="0" min="0" step="0.1" oninput="calcVol()">
      <div class="dim-unit">cm</div>
    </div>
  </div>

  <div class="vol-box">
    <div class="vol-label">Volumen</div>
    <div class="vol-value" id="volVal">— m³</div>
  </div>

  <button class="save-btn" id="saveBtn" onclick="savePkg()" disabled>
    SPEICHERN &amp; WEITER
  </button>
  <div class="hint">Nach dem Speichern: nächsten Barcode scannen</div>
</div>


  </div>
</div>

<!-- LIST PANEL -->

<div class="panel" id="panel-list">
  <div class="list-top">
    <input class="search-input" id="searchInput" type="text" placeholder="Barcode suchen..." oninput="renderList()">
    <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
  </div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="statCount">0</div>
      <div class="stat-lbl">Pakete</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statVol">0.000</div>
      <div class="stat-lbl">m³ gesamt</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statAvg">—</div>
      <div class="stat-lbl">m³ Ø</div>
    </div>
  </div>
  <div id="listBody"></div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
// ── STATE ──────────────────────────────────────────────────────
var packages = [];
var currentCode = null;

try {
  var stored = localStorage.getItem('packscan_v2');
  if (stored) packages = JSON.parse(stored);
} catch(e) {}

// ── TABS ───────────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'list') renderList();
}

// ── BARCODE INPUT ──────────────────────────────────────────────
var barcodeInput = document.getElementById('barcodeInput');

barcodeInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') applyCode(barcodeInput.value.trim());
});

barcodeInput.addEventListener('change', function() {
  if (barcodeInput.value.trim()) applyCode(barcodeInput.value.trim());
});

let scanner;

function triggerScan() {
  const reader = document.getElementById("reader");

  if (reader.style.display === "block") return;

  reader.style.display = "block";

  if (!scanner) {
    scanner = new Html5Qrcode("reader");
  }

scanner.start(
  { facingMode: "environment" },
  {
    fps: 10,
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true
    }
  },
  (decodedText) => {
    scanner.stop();
    document.getElementById("reader").style.display = "none";

    applyCode(decodedText);
    showToast("✓ Barcode erkannt");
  }
).catch((err) => {
  console.log(err);
  showToast("Kamera Fehler", true);
});
}

function applyCode(code) {
  if (!code) return;
  currentCode = code;
  barcodeInput.value = '';
  document.getElementById('codeValue').textContent = code;
  document.getElementById('codeDisplay').classList.add('visible');
  document.getElementById('emptyHint').style.display = 'none';
  document.getElementById('formArea').style.display = 'block';
  document.getElementById('dimL').value = '';
  document.getElementById('dimB').value = '';
  document.getElementById('dimH').value = '';
  document.getElementById('volVal').textContent = '— m³';
  document.getElementById('saveBtn').disabled = true;
  setTimeout(function() { document.getElementById('dimL').focus(); }, 100);
}

// ── VOLUME CALC ────────────────────────────────────────────────
function calcVol() {
  var l = parseFloat(document.getElementById('dimL').value) || 0;
  var b = parseFloat(document.getElementById('dimB').value) || 0;
  var h = parseFloat(document.getElementById('dimH').value) || 0;
  if (l > 0 && b > 0 && h > 0) {
    var vol = (l * b * h) / 1000000;
    document.getElementById('volVal').textContent = vol.toFixed(4) + ' m³';
    document.getElementById('saveBtn').disabled = false;
  } else {
    document.getElementById('volVal').textContent = '— m³';
    document.getElementById('saveBtn').disabled = true;
  }
}

// ── SAVE ───────────────────────────────────────────────────────
function savePkg() {
  var l = parseFloat(document.getElementById('dimL').value);
  var b = parseFloat(document.getElementById('dimB').value);
  var h = parseFloat(document.getElementById('dimH').value);
  if (!currentCode || !l || !b || !h) return;

  var vol = (l * b * h) / 1000000;
  packages.push({
    id: Date.now(),
    code: currentCode,
    length: l, width: b, height: h,
    volume: vol,
    ts: new Date().toISOString()
  });

  try { localStorage.setItem('packscan_v2', JSON.stringify(packages)); } catch(e) {}
  updateBadge();
  showToast('✓ Gespeichert – ' + vol.toFixed(4) + ' m³');

  // Reset
  currentCode = null;
  document.getElementById('codeDisplay').classList.remove('visible');
  document.getElementById('emptyHint').style.display = 'block';
  document.getElementById('formArea').style.display = 'none';
  barcodeInput.focus();
}

// ── LIST ────────────────────────────────────────────────────────
function renderList() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  var filtered = q ? packages.filter(function(p) { return p.code.toLowerCase().indexOf(q) !== -1; }) : packages;

  var total = packages.reduce(function(s, p) { return s + p.volume; }, 0);
  document.getElementById('statCount').textContent = packages.length;
  document.getElementById('statVol').textContent = total.toFixed(3);
  document.getElementById('statAvg').textContent = packages.length ? (total / packages.length).toFixed(4) : '—';

  var body = document.getElementById('listBody');
  if (!filtered.length) {
    body.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>' + (q ? 'Keine Treffer' : 'Noch keine Pakete erfasst') + '</p></div>';
    return;
  }

  var html = '';
  var rev = filtered.slice().reverse();
  rev.forEach(function(p, i) {
    html += '<div class="pkg-item">' +
      '<div class="pkg-nr">#' + (packages.length - i) + '</div>' +
      '<div class="pkg-info">' +
        '<div class="pkg-code">' + escHtml(p.code) + '</div>' +
        '<div class="pkg-dims">' + p.length + ' × ' + p.width + ' × ' + p.height + ' cm</div>' +
      '</div>' +
      '<div class="pkg-vol">' +
        '<div class="pkg-vol-val">' + p.volume.toFixed(4) + '</div>' +
        '<div class="pkg-vol-unit">m³</div>' +
      '</div>' +
      '<button class="del-btn" onclick="deletePkg(' + p.id + ')">✕</button>' +
    '</div>';
  });
  body.innerHTML = html;
}

function deletePkg(id) {
  if (!confirm('Dieses Paket löschen?')) return;
  packages = packages.filter(function(p) { return p.id !== id; });
  try { localStorage.setItem('packscan_v2', JSON.stringify(packages)); } catch(e) {}
  updateBadge();
  renderList();
}

// ── EXPORT ─────────────────────────────────────────────────────
function exportCSV() {
  if (!packages.length) { showToast('Keine Daten vorhanden', true); return; }

  var rows = [['Nr','Barcode','Länge_cm','Breite_cm','Höhe_cm','Volumen_m3','Zeitstempel']];
  packages.forEach(function(p, i) {
    rows.push([
      i + 1, p.code, p.length, p.width, p.height,
      p.volume.toFixed(6),
      new Date(p.ts).toLocaleString('de-DE')
    ]);
  });

  var csv = rows.map(function(r) {
    return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(';');
  }).join('\r\n');

  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'packstucke_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV exportiert – ' + packages.length + ' Pakete');
}

// ── HELPERS ────────────────────────────────────────────────────
function updateBadge() {
  document.getElementById('headerBadge').textContent = packages.length + ' Paket' + (packages.length !== 1 ? 'e' : '');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var toastTimer;
function showToast(msg, warn) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = warn ? 'show warn' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = ''; }, 2400);
}

// ── INIT ───────────────────────────────────────────────────────
updateBadge();

</script>

</body>
</html>
